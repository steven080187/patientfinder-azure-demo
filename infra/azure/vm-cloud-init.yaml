#cloud-config
package_update: true
package_upgrade: true

packages:
  - nginx
  - unzip
  - git

write_files:
  - path: /etc/nginx/sites-available/patientfinder-sbx
    permissions: "0644"
    content: |
      server {
          listen 80 default_server;
          listen [::]:80 default_server;
          server_name _;

          root /var/www/patientfinder;
          index index.html;

          location /api/ {
              proxy_pass http://127.0.0.1:3001;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $host;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }

          location / {
              try_files $uri $uri/ /index.html;
          }
      }

runcmd:
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt-get install -y nodejs
  - mkdir -p /var/www/patientfinder /opt/patientfinder-api
  - rm -f /etc/nginx/sites-enabled/default
  - ln -sf /etc/nginx/sites-available/patientfinder-sbx /etc/nginx/sites-enabled/patientfinder-sbx
  - systemctl enable nginx
  - systemctl restart nginx
