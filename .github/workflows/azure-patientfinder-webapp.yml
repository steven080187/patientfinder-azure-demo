name: Azure PatientFinder WebApp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_PATIENTFINDER_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PATIENTFINDER_WEBAPP_PUBLISH_PROFILE }}
          package: .
