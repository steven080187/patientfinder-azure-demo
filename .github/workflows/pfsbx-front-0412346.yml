# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - pfsbx-front-0412346

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Keep production dependencies only
        run: npm prune --omit=dev

      - name: Prepare deploy package
        run: |
          mkdir -p deploy-package
          cp -R dist deploy-package/dist
          cp server.js deploy-package/server.js
          cp package.json deploy-package/package.json
          cp package-lock.json deploy-package/package-lock.json
          cp -R node_modules deploy-package/node_modules

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy-package

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Deploy to Azure Web App (ZipDeploy)
        env:
          DEPLOY_USER: ${{ secrets.AZURE_WEBAPP_DEPLOY_USER }}
          DEPLOY_PASS: ${{ secrets.AZURE_WEBAPP_DEPLOY_PASS }}
          KUDU_URL: https://pfsbx-front-0412346.scm.azurewebsites.net
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_USER:-}" ] || [ -z "${DEPLOY_PASS:-}" ]; then
            echo "Deploy credentials are missing."
            exit 1
          fi

          zip -qr deploy.zip .
          curl -fsS -u "$DEPLOY_USER:$DEPLOY_PASS" --data-binary @deploy.zip "$KUDU_URL/api/zipdeploy"
